name: Deploy Sphinx Docs

on:
  push:
    branches: [main]

jobs:
  deploy_docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Install Dependencies
        run: |
          pip install sphinx nbsphinx sphinx_rtd_theme ipython ipykernel myst-parser
          python -m ipykernel install --user --name python3
          # Installing your local package (ExoPie) so Sphinx can autodoc it
          pip install . 

      - name: Verify Paths (Debug)
        run: |
          echo "Current directory: $(pwd)"
          ls -R docs/source/

      - name: Build Sphinx Docs
        # Source is docs/source, Output goes to docs/build/html
        run: sphinx-build -b html docs/source docs/build/html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/build/html
          nojekyll: true
